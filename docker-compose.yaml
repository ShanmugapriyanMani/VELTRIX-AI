version: "3.8"

services:
  # ── Trading Bot ──
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veltrix-bot
    env_file: .env
    environment:
      - MODE=paper
      - TZ=Asia/Kolkata
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - timescaledb
    restart: unless-stopped
    command: python src/main.py --mode paper

  # ── Streamlit Dashboard ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-dashboard
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  # ── TimescaleDB (Production Database) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: trading-db
    environment:
      - POSTGRES_DB=trading_bot
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=YOUR_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  timescaledb_data:
