# ═══════════════════════════════════════════
# MAIN CONFIGURATION — Indian AI Trading Bot
# ═══════════════════════════════════════════

upstox:
  # ─── Credentials (set via env vars) ───
  api_key: ""       # Set via UPSTOX_LIVE_API_KEY env var
  api_secret: ""    # Set via UPSTOX_LIVE_API_SECRET env var
  redirect_uri: "http://127.0.0.1:5000/callback"
  api_base_url: "https://api.upstox.com"
  api_hft_url: "https://api-hft.upstox.com"

  # Token & API settings
  access_token_path: "config/.access_token"
  api_version: "v3"

database:
  engine: "sqlite"  # "sqlite" for dev, "timescaledb" for prod
  sqlite_path: "data/trading_bot.db"
  timescaledb:
    host: "localhost"
    port: 5432
    database: "trading_bot"
    user: "trader"
    password: "YOUR_DB_PASSWORD"

trading:
  capital: 50000
  per_strategy:
    fii_flow: 0.30
    options_oi: 0.25
    delivery_vol: 0.25
    ml_pred: 0.20
  market_hours:
    open: "09:15"
    close: "15:30"
    skip_first_minutes: 15
    square_off_time: "15:15"
  timezone: "Asia/Kolkata"

